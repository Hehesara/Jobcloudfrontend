<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications - Job Cloud</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .applications-container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 30px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .app-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .app-table th, .app-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .app-table th {
      background: #f8fcfb;
      color: #1d624e;
      font-weight: 600;
    }
    .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: #e8f5e9;
      color: #2e7d32;
    }
    .no-apps {
      text-align: center;
      padding: 50px;
      color: #777;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <img src="jobcloud12.png" alt="Job Cloud Logo" />
    </div>
    <text>Job Cloud</text>
    <div class="home"><a href="index.html">Home</a></div>
    <div class="sign-in"><a href="login.html">Sign In</a></div>
  </nav>

  <div class="applications-container">
    <h2 style="color: #1d624e; margin-bottom: 10px;"><i class="fa-solid fa-list-check"></i> My Applications</h2>
    <p style="color: #666; margin-bottom: 30px;">Track the status of your submitted job applications.</p>
    
    <div id="apps-list-container">
      <p id="loading-msg">Loading your applications...</p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    protectPage();

    async function loadMyApplications() {
      const user = JSON.parse(localStorage.getItem("jobcloud_user"));
      const container = document.getElementById("apps-list-container");

      if (!user || !user.email) {
        container.innerHTML = `
          <div class='no-apps'>
            <p>Your session is missing required info. Please log out and sign in again!</p>
            <a href='#' onclick='logout(event)' style='color: #1d624e; text-decoration: underline;'>Sign Out & Rekogin</a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(`http://localhost:5000/api/my-applications?email=${encodeURIComponent(user.email)}`);
        const apps = await response.json();

        if (apps.length > 0) {
          let tableHtml = `
            <table class="app-table">
              <thead>
                <tr>
                  <th>Job Title</th>
                  <th>Date Applied</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
          `;

          apps.forEach(app => {
            const date = new Date(app.created_at).toLocaleDateString('en-IN', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            tableHtml += `
              <tr>
                <td style="font-weight: 600; color: #333;">${app.job_title || 'N/A'}</td>
                <td style="color: #666;">${date}</td>
                <td><span class="status-badge">Submitted</span></td>
              </tr>
            `;
          });

          tableHtml += "</tbody></table>";
          container.innerHTML = tableHtml;
        } else {
          container.innerHTML = "<div class='no-apps'><i class='fa-regular fa-folder-open' style='font-size: 40px; margin-bottom: 15px; display: block;'></i><p>You haven't applied for any jobs yet.</p><a href='index.html' style='color: #1d624e; text-decoration: underline;'>Browse Jobs</a></div>";
        }
      } catch (error) {
        console.error("Error:", error);
        container.innerHTML = "<p class='no-apps' style='color: red;'>Failed to load applications. Please check your connection.</p>";
      }
    }

    window.onload = loadMyApplications;
  </script>
</body>
</html>
